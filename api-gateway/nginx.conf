events {}

http{
  limit_req_zone $binary_remote_addr zone=per_ip:10m rate=10r/s;

  upstream frontend_server{
    server frontend:3000;
  }
  upstream user_service_server {
    server user-service:3001;
  }
  upstream review_service_server {
    server review-service:3002;
  }
  upstream group_service_server {
    server group-service:3005;
  }
  upstream chat_service_server {
    server chat-service:3006;
  }
  upstream admin_service_server {
    server admin-service:3007;
  }
  upstream user_library_service_server {
    server user-library_service:3003;
  }
  upstream book_service_server {
    server book-service:3004;
  }
  server{
    listen 80;

    location / {
      proxy_pass http://frontend_server;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwaded_for;
      proxy_set_header X-forwaded-proto $schema;
    }

    location /api/users/ {
      limit_req zone=per_ip burst=20 nodelay;
      proxy_pass http://user_service_server/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwaded_for;
      proxy_set_header X-forwaded-proto $schema;
    }

    location /api/reviews/ {
      limit_req zone=per_ip burst=20 nodelay;
      proxy_pass http://review_service_server/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwaded_for;
      proxy_set_header X-forwaded-proto $schema;
    }

    location /api/groups/ {
      limit_req zone=per_ip burst=20 nodelay;
      proxy_pass http://group_service_server/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwaded_for;
      proxy_set_header X-forwaded-proto $schema;
    }

    location /api/chat/ {
      limit_req zone=per_ip burst=20 nodelay;
      proxy_pass http://chat_service_server/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwaded_for;
      proxy_set_header X-forwaded-proto $schema;
    }

    location /api/admin/ {
      limit_req zone=per_ip burst=20 nodelay;
      proxy_pass http://admin_service_server/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwaded_for;
      proxy_set_header X-forwaded-proto $schema;
    }

    location /api/library/ {
      limit_req zone=per_ip burst=20 nodelay;
      proxy_pass http://user_library_service_server/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwaded_for;
      proxy_set_header X-forwaded-proto $schema;
    }

    location /api/books/ {
      limit_req zone=per_ip burst=20 nodelay;
      proxy_pass http://book_service_server;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwaded_for;
      proxy_set_header X-forwaded-proto $schema;
    }
  }
}