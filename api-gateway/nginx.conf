worker_processes auto;
pid /tmp/nginx.pid;

events {
  worker_connections 2048;
  multi_accept on;
  use epoll;
}

http {
  # ── Logging ────────────────────────────────────────────────────────────────
  log_format main '$remote_addr [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" rt=$request_time';

  access_log /var/log/nginx/access.log main;
  error_log  /var/log/nginx/error.log warn;

  # ── Performance ────────────────────────────────────────────────────────────
  sendfile           on;
  tcp_nopush         on;
  tcp_nodelay        on;
  keepalive_timeout  65;
  keepalive_requests 200;
  server_tokens      off;

  # ── Gzip ───────────────────────────────────────────────────────────────────
  gzip              on;
  gzip_vary         on;
  gzip_proxied      any;
  gzip_comp_level   4;
  gzip_min_length   1024;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/json
    application/javascript
    application/x-javascript
    image/svg+xml
    application/xml;

  # ── Proxy buffering ────────────────────────────────────────────────────────
  proxy_http_version     1.1;
  proxy_buffer_size      16k;
  proxy_buffers          8 16k;
  proxy_busy_buffers_size 32k;
  proxy_connect_timeout  10s;
  proxy_send_timeout     60s;
  proxy_read_timeout     60s;

  # ── Rate limit zones ───────────────────────────────────────────────────────
  # Strict: auth & token endpoints
  limit_req_zone $binary_remote_addr zone=auth:10m    rate=5r/s;
  # Standard: all other API endpoints
  limit_req_zone $binary_remote_addr zone=api:10m     rate=30r/s;
  # Relaxed: chatbot (slow LLM inference)
  limit_req_zone $binary_remote_addr zone=chatbot:10m rate=5r/s;

  # ── Upstreams ──────────────────────────────────────────────────────────────
  upstream frontend {
    server frontend:3000;
    keepalive 32;
  }

  upstream user_service {
    server user-service:3001;
    keepalive 16;
  }

  upstream review_service {
    server review-service:3002;
    keepalive 8;
  }

  upstream library_service {
    server user-library-service:3003;
    keepalive 8;
  }

  upstream book_service {
    server book-service:3004;
    keepalive 16;
  }

  upstream forum_service {
    server forum-service:3005;
    keepalive 8;
  }

  upstream chat_service {
    server chat-service:3006;
    keepalive 8;
  }

  upstream admin_service {
    server admin-service:3007;
    keepalive 4;
  }

  upstream analytics_service {
    server analytics-service:3008;
    keepalive 8;
  }

  upstream chatbot_service {
    server chatbot-service:8000;
    keepalive 4;
  }

  # ── Server ─────────────────────────────────────────────────────────────────
  server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Content-Type-Options  "nosniff"                        always;
    add_header X-Frame-Options         "SAMEORIGIN"                     always;
    add_header X-XSS-Protection        "1; mode=block"                  always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # ── Gateway health ──────────────────────────────────────────────────────
    location = /health {
      access_log off;
      return 200 "healthy\n";
      add_header Content-Type text/plain;
    }

    # ── User service: auth & token (strict rate limit) ──────────────────────
    # Internal routes: POST /api/auth/verify, GET /api/token/:userId
    location ~ ^/api/(auth|token)/ {
      limit_req zone=auth burst=10 nodelay;
      proxy_pass         http://user_service;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   Connection        "";
    }

    # ── User service: user CRUD ─────────────────────────────────────────────
    # user-service mounts routes at /api/*  (e.g. GET /api/me, PATCH /api/me)
    # We expose them at /api/users/* and rewrite the prefix before forwarding.
    location /api/users/ {
      limit_req zone=api burst=40 nodelay;
      rewrite    ^/api/users/(.*) /api/$1 break;
      proxy_pass         http://user_service;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   Connection        "";
    }

    # ── Book service ────────────────────────────────────────────────────────
    # book-service mounts at /api/books
    location /api/books/ {
      limit_req zone=api burst=60 nodelay;
      proxy_pass         http://book_service;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   Connection        "";
    }

    # ── Review service ──────────────────────────────────────────────────────
    # review-service mounts at /api/reviews
    location /api/reviews/ {
      limit_req zone=api burst=40 nodelay;
      proxy_pass         http://review_service;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   Connection        "";
    }

    # ── Library service ─────────────────────────────────────────────────────
    # user-library-service mounts at /reading-lists (no /api prefix).
    # Strip /api/library/ so /api/library/reading-lists/foo → /reading-lists/foo
    location /api/library/ {
      limit_req zone=api burst=40 nodelay;
      rewrite    ^/api/library/(.*) /$1 break;
      proxy_pass         http://library_service;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   Connection        "";
    }

    # ── Forum service ───────────────────────────────────────────────────────
    # forum-service mounts at /api/forums
    location /api/forums/ {
      limit_req zone=api burst=40 nodelay;
      proxy_pass         http://forum_service;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   Connection        "";
    }

    # ── Chat service: HTTP endpoints ────────────────────────────────────────
    # chat-service mounts at /api/chat
    location /api/chat/ {
      limit_req zone=api burst=40 nodelay;
      proxy_pass         http://chat_service;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   Connection        "";
    }

    # ── Chat service: WebSocket / Socket.IO ─────────────────────────────────
    location /socket.io/ {
      proxy_pass             http://chat_service;
      proxy_http_version     1.1;
      proxy_set_header       Upgrade           $http_upgrade;
      proxy_set_header       Connection        "upgrade";
      proxy_set_header       Host              $host;
      proxy_set_header       X-Real-IP         $remote_addr;
      proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header       X-Forwarded-Proto $scheme;
      proxy_cache_bypass     $http_upgrade;
      proxy_read_timeout     86400s;
      proxy_send_timeout     86400s;
    }

    # ── Admin service ───────────────────────────────────────────────────────
    location /api/admin/ {
      limit_req zone=api burst=20 nodelay;
      proxy_pass         http://admin_service;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   Connection        "";
    }

    # ── Analytics service ───────────────────────────────────────────────────
    # analytics-service mounts at /api/analytics
    location /api/analytics/ {
      limit_req zone=api burst=40 nodelay;
      proxy_pass         http://analytics_service;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   Connection        "";
    }

    # ── Chatbot service (Python/FastAPI, slow inference) ────────────────────
    location /api/chatbot/ {
      limit_req zone=chatbot burst=5 nodelay;
      proxy_pass           http://chatbot_service/;
      proxy_set_header     Host              $host;
      proxy_set_header     X-Real-IP         $remote_addr;
      proxy_set_header     X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header     X-Forwarded-Proto $scheme;
      proxy_read_timeout   300s;
      proxy_connect_timeout 75s;
      proxy_send_timeout   120s;
    }

    # ── Frontend (catch-all, including Next.js HMR WebSocket) ───────────────
    location / {
      proxy_pass           http://frontend;
      proxy_http_version   1.1;
      proxy_set_header     Upgrade           $http_upgrade;
      proxy_set_header     Connection        $connection_upgrade;
      proxy_set_header     Host              $host;
      proxy_set_header     X-Real-IP         $remote_addr;
      proxy_set_header     X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header     X-Forwarded-Proto $scheme;
      proxy_read_timeout   120s;
    }
  }

  # Map for WebSocket connection upgrade (used by frontend HMR)
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }
}
