version: '3.8'

services:
  # ============================================
  # DATABASES
  # ============================================
  
  postgres:
    image: postgres:16-alpine
    container_name: shelfspace-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER environment variable is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD environment variable is required}
      POSTGRES_DB: ${POSTGRES_DB:-shelfspace}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./services/user-service/prisma:/docker-entrypoint-initdb.d/user-service
      - ./services/review-service/prisma:/docker-entrypoint-initdb.d/review-service
      - ./services/forum-service/prisma:/docker-entrypoint-initdb.d/forum-service
      - ./services/chat-service/prisma:/docker-entrypoint-initdb.d/chat-service
      - ./services/admin-service/prisma:/docker-entrypoint-initdb.d/admin-service
    ports:
      - "5432:5432"
    networks:
      - shelfspace-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - dev
      - prod

  mongodb:
    image: mongo:7-jammy
    container_name: shelfspace-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:?MONGO_USER environment variable is required}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:?MONGO_PASSWORD environment variable is required}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE:-books}
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - shelfspace-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - dev
      - prod

  redis:
    image: redis:7-alpine
    container_name: shelfspace-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - shelfspace-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - dev
      - prod

  kafka:
    image: bitnami/kafka:3.7
    container_name: shelfspace-kafka
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_CFG_LOG_RETENTION_HOURS: 168
    volumes:
      - kafka_data:/bitnami/kafka
    ports:
      - "9092:9092"
    networks:
      - shelfspace-net
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    profiles:
      - dev
      - prod
    restart: unless-stopped

  # ============================================
  # API GATEWAY
  # ============================================

  nginx-gateway:
    image: nginx:stable-alpine
    container_name: shelfspace-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./api-gateway/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./api-gateway/ssl:/etc/nginx/ssl:ro
    networks:
      - shelfspace-net
    depends_on:
      frontend:
        condition: service_healthy
      user-service:
        condition: service_healthy
      review-service:
        condition: service_healthy
      forum-service:
        condition: service_healthy
      chat-service:
        condition: service_healthy
      admin-service:
        condition: service_healthy
      analytics-service:
        condition: service_healthy
      user-library-service:
        condition: service_healthy
      book-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    profiles:
      - dev
      - prod
    restart: unless-stopped

  # ============================================
  # FRONTEND
  # ============================================

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost}
        NEXT_PUBLIC_BOOK_SERVICE_URL: ${NEXT_PUBLIC_BOOK_SERVICE_URL:-http://localhost}
        NEXT_PUBLIC_FORUM_SERVICE_URL: ${NEXT_PUBLIC_FORUM_SERVICE_URL:-http://localhost}
        NEXT_PUBLIC_REVIEW_SERVICE_URL: ${NEXT_PUBLIC_REVIEW_SERVICE_URL:-http://localhost}
        NEXT_PUBLIC_LIBRARY_SERVICE_URL: ${NEXT_PUBLIC_LIBRARY_SERVICE_URL:-http://localhost/api/library}
        NEXT_PUBLIC_USER_SERVICE_URL: ${NEXT_PUBLIC_USER_SERVICE_URL:-http://localhost/api/users}
    container_name: shelfspace-frontend
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:?GOOGLE_CLIENT_ID environment variable is required}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:?GOOGLE_CLIENT_SECRET environment variable is required}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?NEXTAUTH_SECRET environment variable is required}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost}

      # Public (browser-side) URLs — all routed through NGINX on port 80
      # Books, forums, reviews are called directly from the browser via NGINX
      NEXT_PUBLIC_BOOK_SERVICE_URL: ${NEXT_PUBLIC_BOOK_SERVICE_URL:-http://localhost}
      NEXT_PUBLIC_FORUM_SERVICE_URL: ${NEXT_PUBLIC_FORUM_SERVICE_URL:-http://localhost}
      NEXT_PUBLIC_REVIEW_SERVICE_URL: ${NEXT_PUBLIC_REVIEW_SERVICE_URL:-http://localhost}
      NEXT_PUBLIC_LIBRARY_SERVICE_URL: ${NEXT_PUBLIC_LIBRARY_SERVICE_URL:-http://localhost/api/library}
      # User service: browser calls /api/users/* which NGINX rewrites to /api/* on user-service
      NEXT_PUBLIC_USER_SERVICE_URL: ${NEXT_PUBLIC_USER_SERVICE_URL:-http://localhost/api/users}

      # Server-side (container-internal) URLs — bypass NGINX for lower latency
      USER_SERVICE_URL: http://user-service:3001/api
      ANALYTICS_SERVICE_URL: http://analytics-service:3008
      CHATBOT_SERVICE_URL: ${CHATBOT_SERVICE_URL:-http://chatbot-service:8000}
    networks:
      - shelfspace-net
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    profiles:
      - dev
      - prod
    restart: unless-stopped

  # ============================================
  # BACKEND SERVICES
  # ============================================

  user-service:
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
    container_name: shelfspace-user-service
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-shelfspace}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET environment variable is required}
      LIBRARY_SERVICE_URL: http://user-library-service:3003
      REDIS_URL: redis://redis:6379
      ANALYTICS_SERVICE_URL: http://analytics-service:3008
      KAFKA_BROKERS: ${KAFKA_BROKERS:-kafka:9092}
      KAFKA_SASL_USERNAME: ${KAFKA_SASL_USERNAME:-}
      KAFKA_SASL_PASSWORD: ${KAFKA_SASL_PASSWORD:-}
      KAFKA_SSL: ${KAFKA_SSL:-false}
      KAFKA_SASL_MECHANISM: ${KAFKA_SASL_MECHANISM:-scram-sha-256}
    networks:
      - shelfspace-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    profiles:
      - dev
      - prod
    restart: unless-stopped

  review-service:
    build:
      context: ./services/review-service
      dockerfile: Dockerfile
    container_name: shelfspace-review-service
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3002
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-shelfspace}_reviews
      USER_SERVICE_URL: http://user-service:3001
      ANALYTICS_SERVICE_URL: http://analytics-service:3008
      BOOK_SERVICE_URL: http://book-service:3004
      KAFKA_BROKERS: ${KAFKA_BROKERS:-kafka:9092}
      KAFKA_SASL_USERNAME: ${KAFKA_SASL_USERNAME:-}
      KAFKA_SASL_PASSWORD: ${KAFKA_SASL_PASSWORD:-}
      KAFKA_SSL: ${KAFKA_SSL:-false}
      KAFKA_SASL_MECHANISM: ${KAFKA_SASL_MECHANISM:-scram-sha-256}
    networks:
      - shelfspace-net
    depends_on:
      postgres:
        condition: service_healthy
      user-service:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    profiles:
      - dev
      - prod
    restart: unless-stopped

  user-library-service:
    build:
      context: ./services/user-library-service
      dockerfile: Dockerfile
    container_name: shelfspace-library-service
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3003
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-shelfspace}
      USER_SERVICE_URL: http://user-service:3001
      BOOK_SERVICE_URL: http://book-service:3004
      ANALYTICS_SERVICE_URL: http://analytics-service:3008
      KAFKA_BROKERS: ${KAFKA_BROKERS:-kafka:9092}
      KAFKA_SASL_USERNAME: ${KAFKA_SASL_USERNAME:-}
      KAFKA_SASL_PASSWORD: ${KAFKA_SASL_PASSWORD:-}
      KAFKA_SSL: ${KAFKA_SSL:-false}
      KAFKA_SASL_MECHANISM: ${KAFKA_SASL_MECHANISM:-scram-sha-256}
    networks:
      - shelfspace-net
    depends_on:
      postgres:
        condition: service_healthy
      user-service:
        condition: service_healthy
      book-service:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    profiles:
      - dev
      - prod
    restart: unless-stopped

  book-service:
    build:
      context: ./services/book-service
      dockerfile: Dockerfile
    container_name: shelfspace-book-service
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3004
      MONGO_URI: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongodb:27017/${MONGO_DATABASE:-books}?authSource=admin
      USER_SERVICE_URL: http://user-service:3001
      ANALYTICS_SERVICE_URL: http://analytics-service:3008
      KAFKA_BROKERS: ${KAFKA_BROKERS:-kafka:9092}
      KAFKA_SASL_USERNAME: ${KAFKA_SASL_USERNAME:-}
      KAFKA_SASL_PASSWORD: ${KAFKA_SASL_PASSWORD:-}
      KAFKA_SSL: ${KAFKA_SSL:-false}
      KAFKA_SASL_MECHANISM: ${KAFKA_SASL_MECHANISM:-scram-sha-256}
    networks:
      - shelfspace-net
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    profiles:
      - dev
      - prod
    restart: unless-stopped

  forum-service:
    build:
      context: ./services/forum-service
      dockerfile: Dockerfile
    container_name: shelfspace-forum-service
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3005
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-shelfspace}
      USER_SERVICE_URL: http://user-service:3001
      ANALYTICS_SERVICE_URL: http://analytics-service:3008
      KAFKA_BROKERS: ${KAFKA_BROKERS:-kafka:9092}
      KAFKA_SASL_USERNAME: ${KAFKA_SASL_USERNAME:-}
      KAFKA_SASL_PASSWORD: ${KAFKA_SASL_PASSWORD:-}
      KAFKA_SSL: ${KAFKA_SSL:-false}
      KAFKA_SASL_MECHANISM: ${KAFKA_SASL_MECHANISM:-scram-sha-256}
    networks:
      - shelfspace-net
    depends_on:
      postgres:
        condition: service_healthy
      user-service:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3005/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    profiles:
      - dev
      - prod
    restart: unless-stopped

  chat-service:
    build:
      context: ./services/chat-service
      dockerfile: Dockerfile
    container_name: shelfspace-chat-service
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3006
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-shelfspace}
      USER_SERVICE_URL: http://user-service:3001
      FORUM_SERVICE_URL: http://forum-service:3005
      REDIS_URL: redis://redis:6379
      ALLOWED_ORIGINS: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      ANALYTICS_SERVICE_URL: http://analytics-service:3008
      KAFKA_BROKERS: ${KAFKA_BROKERS:-kafka:9092}
      KAFKA_SASL_USERNAME: ${KAFKA_SASL_USERNAME:-}
      KAFKA_SASL_PASSWORD: ${KAFKA_SASL_PASSWORD:-}
      KAFKA_SSL: ${KAFKA_SSL:-false}
      KAFKA_SASL_MECHANISM: ${KAFKA_SASL_MECHANISM:-scram-sha-256}
    networks:
      - shelfspace-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      user-service:
        condition: service_healthy
      forum-service:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3006/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    profiles:
      - dev
      - prod
    restart: unless-stopped

  admin-service:
    build:
      context: ./services/admin-service
      dockerfile: Dockerfile
    container_name: shelfspace-admin-service
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3007
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-shelfspace}
      USER_SERVICE_URL: http://user-service:3001
      ANALYTICS_SERVICE_URL: http://analytics-service:3008
      KAFKA_BROKERS: ${KAFKA_BROKERS:-kafka:9092}
      KAFKA_SASL_USERNAME: ${KAFKA_SASL_USERNAME:-}
      KAFKA_SASL_PASSWORD: ${KAFKA_SASL_PASSWORD:-}
      KAFKA_SSL: ${KAFKA_SSL:-false}
      KAFKA_SASL_MECHANISM: ${KAFKA_SASL_MECHANISM:-scram-sha-256}
    networks:
      - shelfspace-net
    depends_on:
      postgres:
        condition: service_healthy
      user-service:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3007/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    profiles:
      - dev
      - prod
    restart: unless-stopped

  analytics-service:
    build:
      context: ./services/analytics-service
      dockerfile: Dockerfile
    container_name: shelfspace-analytics-service
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3008
      MONGO_URI: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongodb:27017/${MONGO_ANALYTICS_DB:-analytics}?authSource=admin
      MONGO_DB: ${MONGO_ANALYTICS_DB:-analytics}
      USER_SERVICE_URL: http://user-service:3001
      KAFKA_BROKERS: ${KAFKA_BROKERS:-kafka:9092}
      KAFKA_SASL_USERNAME: ${KAFKA_SASL_USERNAME:-}
      KAFKA_SASL_PASSWORD: ${KAFKA_SASL_PASSWORD:-}
      KAFKA_SSL: ${KAFKA_SSL:-false}
      KAFKA_SASL_MECHANISM: ${KAFKA_SASL_MECHANISM:-scram-sha-256}
    networks:
      - shelfspace-net
    depends_on:
      mongodb:
        condition: service_healthy
      user-service:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3008/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    profiles:
      - dev
      - prod
    restart: unless-stopped

  chatbot-service:
    build:
      context: ./services/chatbot-service
      dockerfile: Dockerfile
    container_name: shelfspace-chatbot-service
    environment:
      PORT: 8000
      PINECONE_API_KEY: ${PINECONE_API_KEY:?PINECONE_API_KEY environment variable is required}
      PINECONE_ENV: ${PINECONE_ENV:?PINECONE_ENV environment variable is required}
      PINECONE_INDEX_NAME: ${PINECONE_INDEX_NAME:-shelfspace-books}
      ANALYTICS_SERVICE_URL: http://analytics-service:3008
    networks:
      - shelfspace-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    profiles:
      - dev
      - prod
    restart: unless-stopped

  # ============================================
  # VOLUMES
  # ============================================

volumes:
  postgres_data:
    driver: local
  mongo_data:
    driver: local
  redis_data:
    driver: local
  kafka_data:
    driver: local

  # ============================================
  # NETWORKS
  # ============================================

networks:
  shelfspace-net:
    driver: bridge
